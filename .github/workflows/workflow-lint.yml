name: Workflow lint

# Lints this repository's own workflow YAML (publish.yml carries the most
# per-repo logic in the org) with the shared actionlint reusable, so a broken
# expression or a shellcheck-visible bug in a run: block fails the PR instead
# of the next scheduled publish.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  workflow-lint:
    uses: Glyndor/.github/.github/workflows/workflow-lint.yml@b12b4c0bb5c2caec50ea8e46a21a5c0519b73ad9 # v1.10.0-pre
