name: Line limit

# Enforces the org file-size standard (soft 300 / hard 500 code lines) via the
# shared reusable, as every product repo already does.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  line-limit:
    uses: Glyndor/.github/.github/workflows/line-limit.yml@b12b4c0bb5c2caec50ea8e46a21a5c0519b73ad9 # v1.10.0-pre
