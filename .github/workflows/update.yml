name: update

# Keeps bucket/*.json in sync with each product's latest signed release, the same
# pull model as Glyndor/apt: no product pushes here. This reads their public
# releases, verifies the signed SHA256SUMS against the org release key, validates
# the re-rendered manifests, and commits them straight to `main` — GitHub-signed
# via the createCommitOnBranch mutation — so a new Windows build reaches
# `scoop update` within a day without any product holding a credential here.
#
# Why a direct commit and not a pull request: the organisation forbids GitHub
# Actions from creating or approving PRs (a locked, org-wide setting), so the
# apt-style "open an auto-merging PR" path is unavailable. Unlike Glyndor/apt —
# whose automation never writes git, it publishes to R2 — a bucket's git content
# *is* the published artifact, so the update must land as a commit. It lands on
# `main` directly, validated in this job *before* it lands (there is no PR gate
# standing between the commit and `scoop install`), and signed by GitHub so
# `main`'s require-signed-commits rule accepts it without a signing key here.
on:
  schedule:
    # Daily, staggered after apt's 06:00 publish so the two don't contend.
    - cron: "30 6 * * *"
  workflow_dispatch:
  # Optional instant trigger: a product's release workflow may
  # POST /repos/Glyndor/scoop-bucket/dispatches with event_type "release".
  # Nothing is wired to it today; the daily schedule is the baseline.
  repository_dispatch:
    types: [release]

permissions:
  contents: read

# Never run two updates at once — they would race on main's HEAD (the second
# would fail its expectedHeadOid check and drop the update to the next run).
concurrency:
  group: update-manifests
  cancel-in-progress: false

jobs:
  update:
    name: Render, validate, and commit
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install the signature verifier
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-cryptography

      - name: Render manifests from the latest signed releases
        id: render
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ./scripts/render-manifests.sh
          if git diff --quiet -- bucket; then
            echo "changed=0" >> "$GITHUB_OUTPUT"
            echo "No manifest changed."
          else
            echo "changed=1" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate the re-rendered manifests
        if: steps.render.outputs.changed == '1'
        run: |
          set -euo pipefail
          # The same gate as ci.yml, run BEFORE the commit lands. A malformed
          # render must never reach `main`: here the commit is the published
          # artifact, with no PR review between it and `scoop install`. Each
          # manifest must be valid JSON with version, homepage, license, and a
          # url+hash+bin per declared architecture.
          shopt -s nullglob
          manifests=(bucket/*.json)
          if [ ${#manifests[@]} -eq 0 ]; then
            echo "::error::no manifests found under bucket/"
            exit 1
          fi
          for m in "${manifests[@]}"; do
            jq -e '
              (.version | type == "string" and (. | length > 0))
              and (.homepage | type == "string")
              and (.license | type == "string")
              and (.architecture | type == "object" and (. | length > 0))
              and (.architecture | to_entries | all(
                    .value.url and .value.hash and (.value.bin | type == "array")))
            ' "$m" >/dev/null || {
              echo "::error file=$m::$m is not a valid, complete Scoop manifest"
              exit 1
            }
            echo "ok  $m"
          done

      - name: Commit the update to main (GitHub-signed)
        if: steps.render.outputs.changed == '1'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Commit the re-rendered manifests onto `main` with the GraphQL
          # createCommitOnBranch mutation. That commit is signed by GitHub
          # (Verified) — the require-signed-commits rule on `main` rejects the
          # unsigned commit a plain `git commit`/`git push` would make, and this
          # needs no signing key (unlike `git commit -S`). expectedHeadOid pins
          # the parent to the HEAD we rendered from, so if main moved since
          # checkout the mutation fails cleanly instead of clobbering — the next
          # scheduled run re-renders from the new HEAD. Modified files go in
          # fileChanges.additions (base64), removed ones in deletions.
          head="$(git rev-parse HEAD)"
          adds="$(git diff --name-only --diff-filter=ACMR -- bucket | while read -r f; do
            jq -cn --arg path "$f" --arg contents "$(base64 -w0 "$f")" '{path:$path, contents:$contents}'
          done | jq -cs '.')"
          dels="$(git diff --name-only --diff-filter=D -- bucket | while read -r f; do
            jq -cn --arg path "$f" '{path:$path}'
          done | jq -cs '.')"
          jq -n \
            --arg repo "$REPO" --arg branch "main" --arg head "$head" \
            --arg msg "chore: update manifests from the latest signed releases" \
            --argjson adds "$adds" --argjson dels "$dels" \
            '{query:"mutation($repo:String!,$branch:String!,$head:GitObjectID!,$msg:String!,$changes:FileChanges!){createCommitOnBranch(input:{branch:{repositoryNameWithOwner:$repo,branchName:$branch},expectedHeadOid:$head,message:{headline:$msg},fileChanges:$changes}){commit{oid}}}",
              variables:{repo:$repo,branch:$branch,head:$head,msg:$msg,changes:{additions:$adds,deletions:$dels}}}' \
            | gh api graphql --input - >/dev/null
          echo "Committed the manifest update to main."
